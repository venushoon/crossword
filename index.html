<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>십자말풀이 퍼즐 메이커</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @media print {
      body { background: white; margin: 0; padding: 0; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      .print-break-inside-avoid { break-inside: avoid; }
      .crossword-cell input { border: none !important; background: transparent !important; }
    }
  </style>
</head>
<body class="bg-gray-50 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
    const IconEye = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
    const IconEyeOff = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;

    function App() {
      // 겹치는 글자가 있는 예시 단어로 변경했습니다.
      const [wordList, setWordList] = useState([
        { word: '학교', clue: '학생들이 모여서 교육을 받는 곳' },
        { word: '교실', clue: '선생님과 학생들이 모여 수업을 하는 방' },
        { word: '실내화', clue: '건물 안에서 신는 신발' },
        { word: '화분', clue: '꽃이나 나무를 심어 가꾸는 그릇' }
      ]);
      
      const [grid, setGrid] = useState([]);
      const [clues, setClues] = useState({ across: [], down: [] });
      const [unplacedWords, setUnplacedWords] = useState([]); // 배치 실패한 단어 목록 상태 추가
      const [isGenerated, setIsGenerated] = useState(false);
      const [showAnswers, setShowAnswers] = useState(false);
      
      const gridContainerRef = useRef(null);

      const addWord = () => {
        setWordList([...wordList, { word: '', clue: '' }]);
      };

      const removeWord = (index) => {
        const newList = wordList.filter((_, i) => i !== index);
        setWordList(newList);
      };

      const handleChange = (index, field, value) => {
        const newList = [...wordList];
        newList[index][field] = value;
        setWordList(newList);
      };

      const generateCrossword = () => {
        const words = wordList
          .filter(item => item.word.trim() !== '' && item.clue.trim() !== '')
          .map(item => ({ ...item, word: item.word.trim().toUpperCase() }))
          .sort((a, b) => b.word.length - a.word.length);

        if (words.length === 0) {
          alert("단어와 힌트를 먼저 입력해주세요.");
          return;
        }

        const GRID_SIZE = 30; 
        let board = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(null));
        let placedWords = [];
        let failedWords = []; // 배치 실패 단어 수집 배열

        const canPlace = (word, row, col, isHorizontal) => {
          if (isHorizontal && col + word.length > GRID_SIZE) return false;
          if (!isHorizontal && row + word.length > GRID_SIZE) return false;

          for (let i = 0; i < word.length; i++) {
            let r = isHorizontal ? row : row + i;
            let c = isHorizontal ? col + i : col;

            if (board[r][c] !== null && board[r][c].letter !== word[i]) {
              return false;
            }

            if (board[r][c] === null) {
              if (isHorizontal) {
                if (r > 0 && board[r - 1][c] !== null) return false;
                if (r < GRID_SIZE - 1 && board[r + 1][c] !== null) return false;
              } else {
                if (c > 0 && board[r][c - 1] !== null) return false;
                if (c < GRID_SIZE - 1 && board[r][c + 1] !== null) return false;
              }
            }
          }
          
          if (isHorizontal) {
            if (col > 0 && board[row][col - 1] !== null) return false;
            if (col + word.length < GRID_SIZE && board[row][col + word.length] !== null) return false;
          } else {
            if (row > 0 && board[row - 1][col] !== null) return false;
            if (row + word.length < GRID_SIZE && board[row + word.length][col] !== null) return false;
          }
          return true;
        };

        const placeWord = (wordObj, row, col, isHorizontal) => {
          for (let i = 0; i < wordObj.word.length; i++) {
            let r = isHorizontal ? row : row + i;
            let c = isHorizontal ? col + i : col;
            board[r][c] = { letter: wordObj.word[i], number: null };
          }
          placedWords.push({ ...wordObj, row, col, isHorizontal });
        };

        const firstWord = words[0];
        placeWord(firstWord, Math.floor(GRID_SIZE / 2), Math.floor((GRID_SIZE - firstWord.word.length) / 2), true);

        for (let i = 1; i < words.length; i++) {
          let currentWord = words[i];
          let placed = false;

          for (let j = 0; j < placedWords.length; j++) {
            if (placed) break;
            let targetWord = placedWords[j];

            for (let c1 = 0; c1 < currentWord.word.length; c1++) {
              if (placed) break;
              for (let c2 = 0; c2 < targetWord.word.length; c2++) {
                if (currentWord.word[c1] === targetWord.word[c2]) {
                  let newRow = targetWord.isHorizontal ? targetWord.row - c1 : targetWord.row + c2;
                  let newCol = targetWord.isHorizontal ? targetWord.col + c2 : targetWord.col - c1;
                  let newIsHorizontal = !targetWord.isHorizontal;

                  if (newRow >= 0 && newCol >= 0 && canPlace(currentWord.word, newRow, newCol, newIsHorizontal)) {
                    placeWord(currentWord, newRow, newCol, newIsHorizontal);
                    placed = true;
                    break;
                  }
                }
              }
            }
          }
          
          // 배치에 실패한 경우 실패 목록에 추가
          if (!placed) {
            failedWords.push(currentWord.word);
          }
        }

        let acrossClues = [];
        let downClues = [];
        let currentNumber = 1;

        for (let r = 0; r < GRID_SIZE; r++) {
          for (let c = 0; c < GRID_SIZE; c++) {
            let startsWord = false;
            
            let wordStartsAcross = placedWords.find(w => w.isHorizontal && w.row === r && w.col === c);
            if (wordStartsAcross) {
              acrossClues.push({ number: currentNumber, clue: wordStartsAcross.clue, word: wordStartsAcross.word });
              startsWord = true;
            }

            let wordStartsDown = placedWords.find(w => !w.isHorizontal && w.row === r && w.col === c);
            if (wordStartsDown) {
              downClues.push({ number: currentNumber, clue: wordStartsDown.clue, word: wordStartsDown.word });
              startsWord = true;
            }

            if (startsWord) {
              board[r][c].number = currentNumber;
              currentNumber++;
            }
          }
        }

        let minR = GRID_SIZE, maxR = 0, minC = GRID_SIZE, maxC = 0;
        for (let r = 0; r < GRID_SIZE; r++) {
          for (let c = 0; c < GRID_SIZE; c++) {
            if (board[r][c] !== null) {
              if (r < minR) minR = r;
              if (r > maxR) maxR = r;
              if (c < minC) minC = c;
              if (c > maxC) maxC = c;
            }
          }
        }

        let trimmedBoard = [];
        if (minR <= maxR && minC <= maxC) {
          for (let r = minR; r <= maxR; r++) {
            trimmedBoard.push(board[r].slice(minC, maxC + 1));
          }
        }

        setGrid(trimmedBoard);
        setClues({ across: acrossClues, down: downClues });
        setUnplacedWords(failedWords); // 상태 업데이트
        setIsGenerated(true);
        setShowAnswers(false);
      };

      const handlePrint = () => {
        window.print();
      };

      return (
        <div className="min-h-screen p-4 md:p-8">
          <div className="max-w-6xl mx-auto bg-white rounded-xl shadow-lg p-6">
            <h1 className="text-2xl font-bold text-center mb-8 text-gray-800 no-print">십자말풀이 퍼즐 메이커</h1>

            <div className="mb-10 no-print">
              <div className="overflow-x-auto mb-4">
                <table className="w-full text-left border-collapse min-w-[600px]">
                  <thead>
                    <tr className="bg-gray-100">
                      <th className="p-3 border font-semibold text-gray-700 w-1/4">단어 (Word)</th>
                      <th className="p-3 border font-semibold text-gray-700 w-2/3">힌트 (Clue)</th>
                      <th className="p-3 border font-semibold text-gray-700 text-center w-auto">관리</th>
                    </tr>
                  </thead>
                  <tbody>
                    {wordList.map((item, index) => (
                      <tr key={index}>
                        <td className="border p-2">
                          <input
                            type="text"
                            className="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                            value={item.word}
                            onChange={(e) => handleChange(index, 'word', e.target.value)}
                            placeholder="예: 민주주의"
                          />
                        </td>
                        <td className="border p-2">
                          <input
                            type="text"
                            className="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                            value={item.clue}
                            onChange={(e) => handleChange(index, 'clue', e.target.value)}
                            placeholder="힌트를 입력하세요"
                          />
                        </td>
                        <td className="border p-2 text-center">
                          <button
                            onClick={() => removeWord(index)}
                            className="text-red-500 hover:text-red-700 p-2"
                            title="삭제"
                          >
                            <IconTrash />
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div className="flex flex-wrap gap-3 justify-center">
                <button
                  onClick={addWord}
                  className="flex items-center gap-2 bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300 transition"
                >
                  <IconPlus /> 단어 추가
                </button>
                <button
                  onClick={generateCrossword}
                  className="flex items-center gap-2 bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition font-bold shadow-md"
                >
                  <IconPlay /> 퍼즐 생성하기
                </button>
              </div>
            </div>

            {isGenerated && grid.length > 0 && (
              <div className="mt-8 border-t pt-8">
                <div className="flex flex-wrap justify-between items-center mb-6 no-print">
                  <h2 className="text-xl font-bold text-gray-800">생성된 퍼즐</h2>
                  <div className="flex gap-3">
                    <button
                      onClick={() => setShowAnswers(!showAnswers)}
                      className="flex items-center gap-2 bg-indigo-100 text-indigo-700 px-4 py-2 rounded hover:bg-indigo-200 transition"
                    >
                      {showAnswers ? <IconEyeOff /> : <IconEye />}
                      {showAnswers ? '정답 숨기기' : '정답 보기'}
                    </button>
                    <button
                      onClick={handlePrint}
                      className="flex items-center gap-2 bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition"
                    >
                      <IconPrinter /> 인쇄 및 PDF 저장
                    </button>
                  </div>
                </div>
                
                {/* 배치 실패 단어 알림 영역 */}
                {unplacedWords.length > 0 && (
                  <div className="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 no-print">
                    <p className="font-bold">⚠️ 알림: 아래 단어들은 다른 단어와 겹치는 글자가 없어 퍼즐에 배치되지 못했습니다.</p>
                    <p className="mt-1">{unplacedWords.join(', ')}</p>
                    <p className="text-sm mt-2 text-gray-600">해결 방법: 기존 단어들과 공통된 글자(예: '학교'-'교실')를 가진 단어를 추가해 보세요.</p>
                  </div>
                )}

                <h1 className="text-3xl font-bold text-center mb-8 hidden print-only">십자말풀이 퍼즐</h1>

                <div className="flex justify-center mb-10 overflow-x-auto pb-4" ref={gridContainerRef}>
                  <div 
                    className="inline-grid gap-0 bg-black border-2 border-black" 
                    style={{ 
                      gridTemplateColumns: `repeat(${grid[0].length}, minmax(0, 1fr))` 
                    }}
                  >
                    {grid.map((row, rIdx) =>
                      row.map((cell, cIdx) => (
                        <div
                          key={`${rIdx}-${cIdx}`}
                          className={`w-10 h-10 md:w-12 md:h-12 relative flex items-center justify-center border border-gray-300 crossword-cell ${
                            cell === null ? 'bg-black' : 'bg-white'
                          }`}
                        >
                          {cell !== null && (
                            <>
                              {cell.number && (
                                <span className="absolute top-0.5 left-1 text-[10px] md:text-xs font-bold text-gray-600 z-10">
                                  {cell.number}
                                </span>
                              )}
                              <input
                                type="text"
                                maxLength="1"
                                className={`w-full h-full text-center text-lg md:text-xl font-bold bg-transparent outline-none relative z-0 ${
                                  showAnswers ? 'text-blue-600' : 'text-transparent'
                                } print-break-inside-avoid`}
                                value={showAnswers ? cell.letter : ''}
                                readOnly={showAnswers}
                              />
                            </>
                          )}
                        </div>
                      ))
                    )}
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 print-break-inside-avoid">
                  <div>
                    <h3 className="font-bold text-lg mb-3 border-b-2 border-gray-800 pb-2">가로 열쇠 (Across)</h3>
                    <ul className="space-y-3">
                      {clues.across.map((clue, idx) => (
                        <li key={idx} className="flex gap-2 text-gray-800">
                          <span className="font-bold min-w-[24px]">{clue.number}.</span>
                          <span>{clue.clue}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                  <div>
                    <h3 className="font-bold text-lg mb-3 border-b-2 border-gray-800 pb-2">세로 열쇠 (Down)</h3>
                    <ul className="space-y-3">
                      {clues.down.map((clue, idx) => (
                        <li key={idx} className="flex gap-2 text-gray-800">
                          <span className="font-bold min-w-[24px]">{clue.number}.</span>
                          <span>{clue.clue}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
