<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>십자말풀이 퍼즐 메이커 프로</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; }
    
    @media print {
      @page { size: A4 portrait; margin: 1.5cm; }
      body, html { background: white !important; height: auto !important; overflow: visible !important; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      .print-exact { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      #main-content { overflow: visible !important; height: auto !important; display: block !important; }
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
    const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconShare = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>;
    const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconEye = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
    const IconEyeOff = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
    const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;

    function App() {
      const [isStudentMode, setIsStudentMode] = useState(false);
      
      const [boardCols, setBoardCols] = useState(12);
      const [boardRows, setBoardRows] = useState(12);
      const [placedWords, setPlacedWords] = useState([]);
      const [emptyColor, setEmptyColor] = useState('#D1D5DB'); 
      const [templateStyle, setTemplateStyle] = useState('traditional'); // 'traditional' | 'floating'
      
      const [selectedCell, setSelectedCell] = useState(null);
      const [direction, setDirection] = useState('across');
      const [inputWord, setInputWord] = useState('');
      const [inputClue, setInputClue] = useState('');

      const [showAnswers, setShowAnswers] = useState(false);
      const [shareUrl, setShareUrl] = useState('');

      const [studentInputs, setStudentInputs] = useState({});
      const [studentChecked, setStudentChecked] = useState(false);

      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const d = urlParams.get('d'); 
        if (d) {
          try {
            const decompressed = LZString.decompressFromEncodedURIComponent(d);
            const parsed = JSON.parse(decompressed);
            setBoardCols(parsed.c);
            setBoardRows(parsed.r);
            setEmptyColor(parsed.col || '#000000');
            setTemplateStyle(parsed.t || 'traditional'); // 템플릿 설정 복원
            const words = parsed.w.map((p, idx) => ({
              id: idx, word: p.w, clue: p.cl, r: p.r, c: p.c, isHorizontal: p.h === 1
            }));
            setPlacedWords(words);
            setIsStudentMode(true);
          } catch(e) { alert("잘못된 주소입니다."); }
        }
      }, []);

      const { grid, clues } = useMemo(() => {
        let newGrid = Array(boardRows).fill(null).map(() => Array(boardCols).fill(null));
        let acrossClues = [];
        let downClues = [];
        let currentNumber = 1;

        placedWords.forEach(wordObj => {
          for (let i = 0; i < wordObj.word.length; i++) {
            let r = wordObj.isHorizontal ? wordObj.r : wordObj.r + i;
            let c = wordObj.isHorizontal ? wordObj.c + i : wordObj.c;
            if (r < boardRows && c < boardCols) {
              if (!newGrid[r][c]) newGrid[r][c] = { letter: wordObj.word[i], number: null };
            }
          }
        });

        for (let r = 0; r < boardRows; r++) {
          for (let c = 0; c < boardCols; c++) {
            let startsWord = false;
            let wordAcross = placedWords.find(w => w.isHorizontal && w.r === r && w.c === c);
            if (wordAcross) {
              acrossClues.push({ number: currentNumber, clue: wordAcross.clue, id: wordAcross.id });
              startsWord = true;
            }
            let wordDown = placedWords.find(w => !w.isHorizontal && w.r === r && w.c === c);
            if (wordDown) {
              downClues.push({ number: currentNumber, clue: wordDown.clue, id: wordDown.id });
              startsWord = true;
            }
            if (startsWord && newGrid[r][c]) {
              newGrid[r][c].number = currentNumber;
              currentNumber++;
            }
          }
        }
        return { grid: newGrid, clues: { across: acrossClues, down: downClues } };
      }, [placedWords, boardRows, boardCols]);

      const handleCellClick = (r, c) => setSelectedCell({ r, c });

      const handleAddWord = () => {
        if (!selectedCell) return alert("먼저 캔버스에서 단어가 시작할 위치(칸)를 클릭해주세요.");
        if (!inputWord.trim() || !inputClue.trim()) return alert("단어와 힌트를 모두 입력하세요.");

        const word = inputWord.trim().toUpperCase();
        const isHorizontal = direction === 'across';
        const { r, c } = selectedCell;

        if (isHorizontal && c + word.length > boardCols) return alert("가로 길이를 초과합니다.");
        if (!isHorizontal && r + word.length > boardRows) return alert("세로 길이를 초과합니다.");

        for (let i = 0; i < word.length; i++) {
          let checkR = isHorizontal ? r : r + i;
          let checkC = isHorizontal ? c + i : c;
          if (grid[checkR][checkC] !== null && grid[checkR][checkC].letter !== word[i]) {
            return alert(`'${word[i]}' 글자가 기존 글자와 충돌합니다.`);
          }
        }

        setPlacedWords([...placedWords, { id: Date.now(), word, clue: inputClue, r, c, isHorizontal }]);
        setInputWord(''); setInputClue(''); setSelectedCell(null);
      };

      const handleDeleteWord = (id) => setPlacedWords(placedWords.filter(w => w.id !== id));

      const generateShareLink = () => {
        if(placedWords.length === 0) return alert("배치된 단어가 없습니다.");
        const minifiedData = {
          c: boardCols, r: boardRows, col: emptyColor, t: templateStyle,
          w: placedWords.map(p => ({ w: p.word, cl: p.clue, r: p.r, c: p.c, h: p.isHorizontal ? 1 : 0 }))
        };
        const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(minifiedData));
        const url = window.location.origin + window.location.pathname + "?d=" + compressed;
        setShareUrl(url);
      };

      const handleStudentInput = (r, c, value) => {
        setStudentChecked(false);
        setStudentInputs(prev => ({ ...prev, [`${r}-${c}`]: value.toUpperCase() }));
      };

      // 템플릿에 따른 그리드 렌더링 함수
      const renderGrid = (isInteractive, isEditor) => {
        const isFloating = templateStyle === 'floating';
        const containerClass = isFloating 
          ? `inline-grid gap-1 bg-transparent p-4 ${isEditor ? '' : 'mx-auto'}`
          : `inline-grid gap-0 border-2 border-gray-500 print-exact bg-gray-200 ${isEditor ? '' : 'mx-auto'}`;

        return (
          <div className={containerClass} style={{ gridTemplateColumns: `repeat(${boardCols}, minmax(0, 1fr))` }}>
            {grid.map((row, rIdx) => row.map((cell, cIdx) => {
              const isSelected = isEditor && selectedCell?.r === rIdx && selectedCell?.c === cIdx;
              const isEmpty = cell === null;
              
              // 학생 모드 채점 상태
              const studentVal = isInteractive && !isEditor ? (studentInputs[`${rIdx}-${cIdx}`] || '') : '';
              let textColor = 'text-gray-900';
              let cellBg = '#ffffff';

              if (isInteractive && !isEditor && studentChecked && studentVal) {
                if (studentVal === cell?.letter) {
                  textColor = 'text-blue-700 font-extrabold'; cellBg = '#EFF6FF';
                } else {
                  textColor = 'text-red-600 font-extrabold'; cellBg = '#FEF2F2';
                }
              }

              // 선 날리기(Floating) 모드 스타일 계산
              if (isFloating) {
                if (isEmpty && !isSelected) {
                  return <div key={`${rIdx}-${cIdx}`} className="w-9 h-9 sm:w-11 sm:h-11 bg-transparent" onClick={() => isEditor && handleCellClick(rIdx, cIdx)}></div>;
                }
                return (
                  <div 
                    key={`${rIdx}-${cIdx}`} onClick={() => isEditor && handleCellClick(rIdx, cIdx)}
                    className={`w-9 h-9 sm:w-11 sm:h-11 relative flex items-center justify-center border border-gray-300 rounded-md shadow-sm transition-colors ${isSelected ? 'ring-4 ring-blue-500 z-20 scale-110 bg-blue-100' : 'bg-white'}`}
                    style={{ backgroundColor: cellBg !== '#ffffff' ? cellBg : undefined }}
                  >
                    {cell && (
                      <>
                        {cell.number && <span className="absolute top-0.5 left-1 text-[10px] font-bold text-gray-500 z-10 pointer-events-none">{cell.number}</span>}
                        {isEditor ? (
                          <span className="text-lg font-bold text-gray-900 pointer-events-none">{showAnswers || isSelected ? cell.letter : ''}</span>
                        ) : (
                          <input type="text" maxLength="1" value={studentVal} onChange={(e) => handleStudentInput(rIdx, cIdx, e.target.value)} className={`w-full h-full p-0 m-0 text-center text-xl sm:text-2xl font-bold bg-transparent outline-none focus:ring-2 focus:ring-inset focus:ring-blue-500 rounded-md ${textColor}`} />
                        )}
                      </>
                    )}
                    {isEditor && !cell && isSelected && <span className="text-blue-800 font-bold text-2xl drop-shadow pointer-events-none">+</span>}
                  </div>
                );
              }

              // 전통(Traditional) 모드 스타일 계산
              let traditionalBg = isEmpty ? (isSelected ? undefined : emptyColor) : cellBg;
              return (
                <div 
                  key={`${rIdx}-${cIdx}`} onClick={() => isEditor && handleCellClick(rIdx, cIdx)}
                  className={`w-9 h-9 sm:w-11 sm:h-11 relative flex items-center justify-center border border-gray-400 transition-colors ${isSelected ? 'bg-blue-300 ring-4 ring-blue-500 z-20 shadow-lg scale-110' : (!isEmpty && isEditor ? 'hover:bg-blue-50' : '')} ${isEmpty && !isEditor && !isFloating ? 'print-exact' : ''}`}
                  style={{ backgroundColor: traditionalBg }}
                >
                  {cell && (
                    <>
                      {cell.number && <span className="absolute top-[2px] left-[3px] text-[10px] font-bold text-gray-500 z-10 leading-none pointer-events-none">{cell.number}</span>}
                      {isEditor ? (
                        <span className="text-lg font-bold text-gray-900 pointer-events-none">{showAnswers || isSelected ? cell.letter : ''}</span>
                      ) : (
                        <input type="text" maxLength="1" value={studentVal} onChange={(e) => handleStudentInput(rIdx, cIdx, e.target.value)} className={`w-full h-full p-0 m-0 text-center text-xl sm:text-2xl font-bold bg-transparent outline-none focus:ring-2 focus:ring-inset focus:ring-blue-500 ${textColor}`} />
                      )}
                    </>
                  )}
                  {isEditor && !cell && isSelected && <span className="text-blue-800 font-bold text-2xl drop-shadow pointer-events-none">+</span>}
                </div>
              );
            }))}
          </div>
        );
      };

      // ----------------- [1. 학생용 온라인 풀이 화면] -----------------
      if (isStudentMode) {
        // floating 템플릿일 경우 배경을 은은한 그라데이션으로 처리하여 더욱 예쁘게 보입니다.
        const bgStyle = templateStyle === 'floating' ? "bg-gradient-to-br from-indigo-50 via-white to-blue-50" : "bg-gray-100";
        
        return (
          <div className={`flex flex-col h-screen ${bgStyle}`}>
            <header className="bg-white shadow px-6 py-4 flex justify-between items-center border-b-4 border-blue-600 flex-shrink-0">
              <h1 className="text-xl font-bold text-gray-800">십자말풀이 과제</h1>
              <button onClick={() => setStudentChecked(true)} className="flex items-center gap-2 bg-blue-600 text-white px-5 py-2 rounded-lg font-bold shadow hover:bg-blue-700 transition">
                <IconCheck /> 정답 확인
              </button>
            </header>

            <main className="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col gap-6 max-w-6xl mx-auto w-full">
              {/* 퍼즐판 (상단 크게) */}
              <div className="bg-white/80 backdrop-blur-sm p-6 rounded-2xl shadow-lg flex justify-center items-start overflow-x-auto min-h-[400px]">
                {renderGrid(true, false)}
              </div>

              {/* 열쇠 목록 (하단 넓게) */}
              <div className="bg-white p-6 rounded-2xl shadow-lg">
                <h2 className="text-xl font-bold mb-4 text-gray-800 border-b pb-2">열쇠 (힌트)</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  <div>
                    <h3 className="font-bold text-blue-700 mb-4 flex items-center gap-2"><span className="w-2 h-6 bg-blue-600 rounded-sm"></span> 가로 열쇠</h3>
                    <ul className="space-y-4 px-2">
                      {clues.across.map((c, i) => (
                        <li key={`a-${i}`} className="flex gap-3 items-start">
                          <span className="font-bold bg-blue-100 text-blue-800 px-2 py-0.5 rounded-md shrink-0">{c.number}</span>
                          <span className="text-gray-700 leading-relaxed text-lg">{c.clue}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                  <div>
                    <h3 className="font-bold text-green-700 mb-4 flex items-center gap-2"><span className="w-2 h-6 bg-green-600 rounded-sm"></span> 세로 열쇠</h3>
                    <ul className="space-y-4 px-2">
                      {clues.down.map((c, i) => (
                        <li key={`d-${i}`} className="flex gap-3 items-start">
                          <span className="font-bold bg-green-100 text-green-800 px-2 py-0.5 rounded-md shrink-0">{c.number}</span>
                          <span className="text-gray-700 leading-relaxed text-lg">{c.clue}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                </div>
              </div>
            </main>
          </div>
        );
      }

      // ----------------- [2. 교사용 에디터 화면] -----------------
      return (
        <div className="flex flex-col md:flex-row h-screen bg-gray-50">
          
          {/* 사이드바 메뉴 (간소화) */}
          <aside className="w-full md:w-64 bg-white shadow-xl z-20 flex-shrink-0 flex flex-col no-print border-r">
            <div className="p-6 bg-slate-800 text-white border-b border-slate-700">
              <h1 className="text-xl font-bold mb-1">퍼즐 제작소</h1>
              <p className="text-slate-400 text-sm">에디터 대시보드</p>
            </div>
            
            <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
              <button onClick={() => setShowAnswers(!showAnswers)} className={`flex items-center gap-3 w-full text-left p-3 rounded-lg font-bold transition ${showAnswers ? 'bg-indigo-100 text-indigo-700 border border-indigo-200' : 'text-gray-600 hover:bg-gray-100'}`}>
                {showAnswers ? <IconEyeOff /> : <IconEye />} 정답 보기
              </button>
              <button onClick={generateShareLink} className="flex items-center gap-3 w-full text-left p-3 rounded-lg font-bold bg-blue-50 text-blue-700 hover:bg-blue-100 transition border border-blue-200">
                <IconShare /> 공유 (QR)
              </button>
              <button onClick={() => window.print()} className="flex items-center gap-3 w-full text-left p-3 rounded-lg font-bold bg-green-50 text-green-700 hover:bg-green-100 transition border border-green-200 mt-auto md:mt-0">
                <IconPrinter /> 출력 (인쇄)
              </button>
            </div>
          </aside>

          {/* 메인 작업 영역 */}
          <main id="main-content" className="flex-1 flex flex-col overflow-y-auto print:overflow-visible bg-gray-100 print:bg-white relative">
            
            {/* 전자칠판용 대형 공유 모달창 */}
            {shareUrl && (
              <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm no-print px-4">
                <div className="bg-white rounded-3xl shadow-2xl p-8 md:p-12 w-full max-w-4xl relative animate-fade-in-up">
                  <button onClick={() => setShareUrl('')} className="absolute top-6 right-6 text-gray-400 hover:text-red-500 font-bold text-3xl transition-transform hover:scale-110">×</button>
                  
                  <div className="text-center mb-8">
                    <h2 className="text-3xl md:text-4xl font-extrabold text-blue-700 mb-4">🚀 학생 배포용 QR 코드</h2>
                    <p className="text-gray-600 text-lg">전자칠판에 띄워두고 학생 스마트폰이나 태블릿으로 스캔하게 하세요.</p>
                  </div>

                  <div className="flex flex-col md:flex-row gap-10 items-center justify-center bg-blue-50/50 p-8 rounded-2xl border border-blue-100">
                    <div className="bg-white p-4 rounded-2xl border shadow-md shrink-0">
                      <img src={`https://api.qrserver.com/v1/create-qr-code/?size=300x300&ecc=L&data=${encodeURIComponent(shareUrl)}`} alt="QR Code" className="w-48 h-48 md:w-64 md:h-64 object-contain" />
                    </div>
                    
                    <div className="w-full md:w-auto flex-1 text-center md:text-left">
                      <h4 className="font-bold text-gray-800 mb-3 text-xl">웹 주소 (URL) 복사</h4>
                      <div className="flex flex-col gap-3">
                        <input type="text" readOnly value={shareUrl} className="w-full bg-white border-2 border-gray-200 p-4 rounded-xl text-sm text-gray-600 outline-none focus:border-blue-500 transition" />
                        <button onClick={() => { navigator.clipboard.writeText(shareUrl); alert('복사완료!'); }} className="bg-blue-600 text-white px-6 py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-md">주소 복사하기</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            <div className="p-4 md:p-6 flex flex-col lg:flex-row gap-6 no-print max-w-[1600px] mx-auto w-full">
              
              {/* 왼쪽: 모눈종이 캔버스 & 하단 열쇠 목록 */}
              <div className="flex-[2] flex flex-col gap-6">
                
                {/* 캔버스 */}
                <div className="bg-white shadow-md rounded-xl p-6 flex flex-col min-h-[500px]">
                  <h2 className="text-xl font-bold text-gray-800 mb-4 border-b pb-3 flex items-center gap-2">
                    <span className="bg-blue-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center text-sm">1</span> 캔버스 보드
                  </h2>
                  <div className="flex justify-center overflow-x-auto pb-4 flex-1 items-center bg-slate-50 rounded-lg p-4">
                    {renderGrid(false, true)}
                  </div>
                </div>

                {/* 열쇠 목록 (하단 넓게 배치) */}
                <div className="bg-white shadow-md rounded-xl p-6">
                  <h2 className="text-xl font-bold text-gray-800 mb-6 border-b pb-3 flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <span className="bg-blue-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center text-sm">3</span> 등록된 열쇠 목록
                    </div>
                    <span className="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-sm">총 {placedWords.length}개</span>
                  </h2>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                      <h4 className="text-base font-bold text-blue-700 mb-3 bg-blue-50 p-2 rounded">가로 열쇠 (Across)</h4>
                      {clues.across.length === 0 ? <p className="text-sm text-gray-400 pl-2">없음</p> : (
                        <ul className="space-y-2">
                          {clues.across.map(c => (
                            <li key={c.id} className="group flex justify-between items-start text-sm bg-white p-3 rounded border border-gray-200 hover:border-blue-400 shadow-sm transition">
                              <div className="flex gap-3">
                                <span className="font-bold text-blue-600 min-w-[16px]">{c.number}.</span>
                                <span className="text-gray-700">{c.clue}</span>
                              </div>
                              <button onClick={() => handleDeleteWord(c.id)} className="text-gray-300 hover:text-red-500 transition p-1 shrink-0"><IconTrash/></button>
                            </li>
                          ))}
                        </ul>
                      )}
                    </div>
                    <div>
                      <h4 className="text-base font-bold text-green-700 mb-3 bg-green-50 p-2 rounded">세로 열쇠 (Down)</h4>
                      {clues.down.length === 0 ? <p className="text-sm text-gray-400 pl-2">없음</p> : (
                        <ul className="space-y-2">
                          {clues.down.map(c => (
                            <li key={c.id} className="group flex justify-between items-start text-sm bg-white p-3 rounded border border-gray-200 hover:border-green-400 shadow-sm transition">
                              <div className="flex gap-3">
                                <span className="font-bold text-green-600 min-w-[16px]">{c.number}.</span>
                                <span className="text-gray-700">{c.clue}</span>
                              </div>
                              <button onClick={() => handleDeleteWord(c.id)} className="text-gray-300 hover:text-red-500 transition p-1 shrink-0"><IconTrash/></button>
                            </li>
                          ))}
                        </ul>
                      )}
                    </div>
                  </div>
                </div>

              </div>

              {/* 오른쪽: 옵션 박스 & 단어 입력 폼 */}
              <div className="flex-[1] flex flex-col gap-6 min-w-[320px]">
                
                {/* 1. 옵션 (설정) 박스 */}
                <div className="bg-white shadow-md rounded-xl p-5 border-t-4 border-slate-700">
                  <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <IconSettings /> 환경 설정 (옵션)
                  </h3>
                  
                  <div className="space-y-4 bg-gray-50 p-4 rounded-xl border">
                    {/* 그리드 크기 */}
                    <div className="flex justify-between items-center">
                      <span className="text-sm font-bold text-gray-700">그리드 칸 수</span>
                      <div className="flex gap-2">
                        <label className="text-xs text-gray-500 flex items-center gap-1">가로 <input type="number" min="5" max="30" value={boardCols} onChange={e=>setBoardCols(Number(e.target.value))} className="w-12 border p-1 rounded text-center font-bold text-gray-800" /></label>
                        <label className="text-xs text-gray-500 flex items-center gap-1">세로 <input type="number" min="5" max="30" value={boardRows} onChange={e=>setBoardRows(Number(e.target.value))} className="w-12 border p-1 rounded text-center font-bold text-gray-800" /></label>
                      </div>
                    </div>

                    {/* 템플릿 선택 (전통 vs 선날리기) */}
                    <div>
                      <span className="text-sm font-bold text-gray-700 block mb-2">디자인 템플릿</span>
                      <div className="flex gap-2">
                        <label className={`flex-1 flex justify-center items-center py-2 text-sm rounded border cursor-pointer font-bold transition ${templateStyle === 'traditional' ? 'bg-blue-50 border-blue-400 text-blue-700' : 'bg-white border-gray-200 text-gray-500'}`}>
                          <input type="radio" name="template" value="traditional" checked={templateStyle === 'traditional'} onChange={(e) => setTemplateStyle(e.target.value)} className="hidden" /> 🟦 전통(채우기)
                        </label>
                        <label className={`flex-1 flex justify-center items-center py-2 text-sm rounded border cursor-pointer font-bold transition ${templateStyle === 'floating' ? 'bg-blue-50 border-blue-400 text-blue-700' : 'bg-white border-gray-200 text-gray-500'}`}>
                          <input type="radio" name="template" value="floating" checked={templateStyle === 'floating'} onChange={(e) => setTemplateStyle(e.target.value)} className="hidden" /> ✨ 선 날리기
                        </label>
                      </div>
                    </div>

                    {/* 빈칸 색상 (전통 템플릿일 때만 활성화) */}
                    <div className={`flex justify-between items-center transition-opacity ${templateStyle === 'floating' ? 'opacity-40 pointer-events-none' : ''}`}>
                      <span className="text-sm font-bold text-gray-700">빈칸 배경색</span>
                      <input type="color" value={emptyColor} onChange={e=>setEmptyColor(e.target.value)} className="w-8 h-8 rounded cursor-pointer border-0 p-0" />
                    </div>
                  </div>
                </div>

                {/* 2. 단어 입력 폼 */}
                <div className={`bg-white shadow-md rounded-xl p-5 border-t-4 transition-colors ${selectedCell ? 'border-blue-600' : 'border-gray-200'}`}>
                  <h3 className="font-bold text-gray-800 mb-4 flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <span className="bg-blue-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center text-sm">2</span> 단어 입력
                    </div>
                    {selectedCell && <span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded shadow-sm font-bold">좌표: {selectedCell.r + 1}행 {selectedCell.c + 1}열</span>}
                  </h3>
                  
                  {!selectedCell ? (
                    <div className="bg-blue-50 border border-blue-100 p-6 rounded-xl text-center flex flex-col items-center justify-center min-h-[200px]">
                      <span className="text-3xl mb-2">👆</span>
                      <p className="text-sm font-bold text-blue-800">왼쪽 캔버스에서</p>
                      <p className="text-sm text-blue-600">단어를 시작할 칸을 먼저 클릭하세요.</p>
                    </div>
                  ) : (
                    <div className="space-y-4 animate-fade-in">
                      <div className="flex gap-2 p-1 bg-gray-100 rounded-lg">
                        <button onClick={() => setDirection('across')} className={`flex-1 py-2 text-sm font-bold rounded shadow-sm transition ${direction === 'across' ? 'bg-white text-blue-600 border border-blue-200' : 'text-gray-500 hover:bg-gray-200'}`}>가로 ➔</button>
                        <button onClick={() => setDirection('down')} className={`flex-1 py-2 text-sm font-bold rounded shadow-sm transition ${direction === 'down' ? 'bg-white text-blue-600 border border-blue-200' : 'text-gray-500 hover:bg-gray-200'}`}>세로 ⬇</button>
                      </div>
                      
                      <div>
                        <label className="block text-xs font-bold text-gray-500 mb-1">단어 (Word)</label>
                        <input type="text" value={inputWord} onChange={e => setInputWord(e.target.value)} placeholder="정답 단어 입력" className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none font-bold text-lg" />
                      </div>
                      
                      <div>
                        <label className="block text-xs font-bold text-gray-500 mb-1">힌트 설명 (Clue)</label>
                        <textarea value={inputClue} onChange={e => setInputClue(e.target.value)} placeholder="단어에 대한 힌트 입력" rows="3" className="w-full p-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none resize-none text-sm" />
                      </div>
                      
                      <button onClick={handleAddWord} className="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 transition shadow-md text-lg">보드에 배치하기</button>
                    </div>
                  )}
                </div>

              </div>
            </div>

            {/* 인쇄용 렌더링 영역 */}
            <div className="hidden print-only print:block p-8 bg-white">
              <h1 className="text-3xl font-bold text-center mb-10">십자말풀이 퍼즐</h1>
              <div className="flex justify-center mb-12">
                {renderGrid(false, true)}
              </div>
              <div className="grid grid-cols-2 gap-10 text-sm break-inside-avoid">
                <div>
                  <h3 className="font-bold text-lg mb-4 border-b-2 border-gray-800 pb-2">가로 열쇠</h3>
                  <ul className="space-y-3">
                    {clues.across.map((c, i) => <li key={i} className="flex gap-3"><span className="font-bold min-w-[20px]">{c.number}.</span><span className="leading-relaxed">{c.clue}</span></li>)}
                  </ul>
                </div>
                <div>
                  <h3 className="font-bold text-lg mb-4 border-b-2 border-gray-800 pb-2">세로 열쇠</h3>
                  <ul className="space-y-3">
                    {clues.down.map((c, i) => <li key={i} className="flex gap-3"><span className="font-bold min-w-[20px]">{c.number}.</span><span className="leading-relaxed">{c.clue}</span></li>)}
                  </ul>
                </div>
              </div>
            </div>

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    /* 애니메이션용 CSS */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-in { animation: fadeIn 0.3s ease-in forwards; }
  </style>
</body>
</html>
