<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>십자말풀이 퍼즐 (온라인 공유 지원)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body class="bg-gray-100 font-sans min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
    const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconShare = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>;
    const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;

    function App() {
      // 1. 상태 관리
      const [isStudentMode, setIsStudentMode] = useState(false);
      
      // 에디터 상태
      const [boardCols, setBoardCols] = useState(12);
      const [boardRows, setBoardRows] = useState(12);
      const [placedWords, setPlacedWords] = useState([]);
      const [emptyColor, setEmptyColor] = useState('#000000'); // 빈칸 색상 (기본 검정)
      
      const [selectedCell, setSelectedCell] = useState(null);
      const [direction, setDirection] = useState('across');
      const [inputWord, setInputWord] = useState('');
      const [inputClue, setInputClue] = useState('');

      const [showAnswers, setShowAnswers] = useState(false);
      const [shareUrl, setShareUrl] = useState('');

      // 학생용 상태
      const [studentInputs, setStudentInputs] = useState({});
      const [studentChecked, setStudentChecked] = useState(false);

      // 2. 초기 로드 시 URL 확인 (학생 모드 진입)
      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const data = urlParams.get('data');
        if (data) {
          try {
            const parsed = JSON.parse(decodeURIComponent(atob(data)));
            setBoardCols(parsed.cols);
            setBoardRows(parsed.rows);
            setPlacedWords(parsed.words);
            setEmptyColor(parsed.color || '#000000');
            setIsStudentMode(true);
          } catch (e) {
            alert("잘못된 퍼즐 주소입니다.");
          }
        }
      }, []);

      // 3. 그리드 및 힌트 데이터 실시간 계산
      const { grid, clues } = useMemo(() => {
        let newGrid = Array(boardRows).fill(null).map(() => Array(boardCols).fill(null));
        let acrossClues = [];
        let downClues = [];
        let currentNumber = 1;

        placedWords.forEach(wordObj => {
          for (let i = 0; i < wordObj.word.length; i++) {
            let r = wordObj.isHorizontal ? wordObj.r : wordObj.r + i;
            let c = wordObj.isHorizontal ? wordObj.c + i : wordObj.c;
            if (r < boardRows && c < boardCols) {
              if (!newGrid[r][c]) newGrid[r][c] = { letter: wordObj.word[i], number: null };
            }
          }
        });

        for (let r = 0; r < boardRows; r++) {
          for (let c = 0; c < boardCols; c++) {
            let startsWord = false;
            
            let wordAcross = placedWords.find(w => w.isHorizontal && w.r === r && w.c === c);
            if (wordAcross) {
              acrossClues.push({ number: currentNumber, clue: wordAcross.clue, id: wordAcross.id });
              startsWord = true;
            }

            let wordDown = placedWords.find(w => !w.isHorizontal && w.r === r && w.c === c);
            if (wordDown) {
              downClues.push({ number: currentNumber, clue: wordDown.clue, id: wordDown.id });
              startsWord = true;
            }

            if (startsWord && newGrid[r][c]) {
              newGrid[r][c].number = currentNumber;
              currentNumber++;
            }
          }
        }
        return { grid: newGrid, clues: { across: acrossClues, down: downClues } };
      }, [placedWords, boardRows, boardCols]);

      // 4. 에디터 이벤트 핸들러
      const handleCellClick = (r, c) => setSelectedCell({ r, c });

      const handleAddWord = () => {
        if (!selectedCell) return alert("먼저 보드에서 시작할 칸을 클릭해주세요.");
        if (!inputWord.trim() || !inputClue.trim()) return alert("단어와 힌트를 모두 입력하세요.");

        const word = inputWord.trim().toUpperCase();
        const isHorizontal = direction === 'across';
        const { r, c } = selectedCell;

        if (isHorizontal && c + word.length > boardCols) return alert("가로 길이를 초과합니다.");
        if (!isHorizontal && r + word.length > boardRows) return alert("세로 길이를 초과합니다.");

        for (let i = 0; i < word.length; i++) {
          let checkR = isHorizontal ? r : r + i;
          let checkC = isHorizontal ? c + i : c;
          if (grid[checkR][checkC] !== null && grid[checkR][checkC].letter !== word[i]) {
            return alert(`'${word[i]}' 글자가 기존 글자와 충돌합니다.`);
          }
        }

        setPlacedWords([...placedWords, { id: Date.now(), word, clue: inputClue, r, c, isHorizontal }]);
        setInputWord(''); setInputClue(''); setSelectedCell(null);
      };

      const handleDeleteWord = (id) => setPlacedWords(placedWords.filter(w => w.id !== id));

      // 5. 공유 링크 생성 로직
      const generateShareLink = () => {
        if(placedWords.length === 0) return alert("배치된 단어가 없습니다.");
        const payload = { cols: boardCols, rows: boardRows, words: placedWords, color: emptyColor };
        const encoded = btoa(encodeURIComponent(JSON.stringify(payload)));
        const url = window.location.origin + window.location.pathname + "?data=" + encoded;
        setShareUrl(url);
      };

      // 6. 학생용 모드 입력 처리 및 채점
      const handleStudentInput = (r, c, value) => {
        setStudentChecked(false); // 입력이 변경되면 채점 초기화
        setStudentInputs(prev => ({ ...prev, [`${r}-${c}`]: value.toUpperCase() }));
      };

      const checkAnswers = () => {
        setStudentChecked(true);
      };

      // ----------------- [학생용 풀이 화면 렌더링] -----------------
      if (isStudentMode) {
        return (
          <div className="max-w-4xl mx-auto px-4 py-8">
            <header className="bg-white shadow rounded-xl p-6 mb-6 flex justify-between items-center border-t-4 border-blue-500">
              <h1 className="text-2xl font-bold text-gray-800">십자말풀이 과제</h1>
              <button onClick={checkAnswers} className="flex items-center gap-2 bg-blue-600 text-white px-6 py-2.5 rounded-lg font-bold shadow hover:bg-blue-700 transition">
                <IconCheck /> 정답 확인하기
              </button>
            </header>

            <div className="flex flex-col lg:flex-row gap-6">
              {/* 퍼즐판 */}
              <div className="bg-white p-6 rounded-xl shadow-lg overflow-x-auto flex-1 flex justify-center">
                <div className="inline-grid gap-0 border-2 border-gray-600" style={{ gridTemplateColumns: `repeat(${boardCols}, minmax(0, 1fr))` }}>
                  {grid.map((row, rIdx) => row.map((cell, cIdx) => {
                    const studentVal = studentInputs[`${rIdx}-${cIdx}`] || '';
                    let textColor = 'text-gray-900';
                    if (studentChecked && studentVal) {
                      textColor = studentVal === cell?.letter ? 'text-blue-600 font-extrabold' : 'text-red-500 font-extrabold';
                    }

                    return (
                      <div key={`${rIdx}-${cIdx}`} className={`w-10 h-10 sm:w-12 sm:h-12 relative flex items-center justify-center border border-gray-300`} style={{ backgroundColor: cell === null ? emptyColor : '#ffffff' }}>
                        {cell !== null && (
                          <>
                            {cell.number && <span className="absolute top-0.5 left-1 text-[10px] font-bold text-gray-500 z-10">{cell.number}</span>}
                            <input
                              type="text"
                              maxLength="1"
                              value={studentVal}
                              onChange={(e) => handleStudentInput(rIdx, cIdx, e.target.value)}
                              className={`w-full h-full text-center text-lg sm:text-xl font-bold bg-transparent outline-none z-0 focus:bg-yellow-100 ${textColor}`}
                            />
                          </>
                        )}
                      </div>
                    )
                  }))}
                </div>
              </div>

              {/* 힌트 목록 */}
              <div className="bg-white p-6 rounded-xl shadow-lg w-full lg:w-[350px] overflow-y-auto max-h-[600px]">
                <h3 className="font-bold text-lg mb-3 border-b pb-2 text-blue-700">가로 열쇠 (Across)</h3>
                <ul className="space-y-4 mb-8">
                  {clues.across.map((c, i) => (
                    <li key={`a-${i}`} className="flex gap-2">
                      <span className="font-bold bg-gray-100 px-2 py-0.5 rounded text-sm h-fit">{c.number}</span>
                      <span className="text-gray-700">{c.clue}</span>
                    </li>
                  ))}
                </ul>
                <h3 className="font-bold text-lg mb-3 border-b pb-2 text-green-700">세로 열쇠 (Down)</h3>
                <ul className="space-y-4">
                  {clues.down.map((c, i) => (
                    <li key={`d-${i}`} className="flex gap-2">
                      <span className="font-bold bg-gray-100 px-2 py-0.5 rounded text-sm h-fit">{c.number}</span>
                      <span className="text-gray-700">{c.clue}</span>
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          </div>
        );
      }

      // ----------------- [교사용 에디터 화면 렌더링] -----------------
      return (
        <div className="max-w-7xl mx-auto px-4 py-8 font-sans">
          <style>
            {`
              @media print {
                @page { size: A4 portrait; margin: 1.5cm; }
                body { background: white !important; }
                .no-print { display: none !important; }
                .print-exact { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
              }
            `}
          </style>

          <header className="flex flex-col md:flex-row justify-between items-center bg-white shadow rounded-xl p-6 mb-6 no-print">
            <h1 className="text-2xl font-bold text-gray-800 mb-4 md:mb-0">십자말풀이 제작소 (에디터)</h1>
            <div className="flex flex-wrap justify-center gap-3">
              <button onClick={() => setShowAnswers(!showAnswers)} className="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium">
                {showAnswers ? '정답 숨기기' : '전체 정답 확인'}
              </button>
              <button onClick={generateShareLink} className="flex items-center gap-2 px-4 py-2 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 font-bold transition">
                <IconShare /> 학생에게 온라인 배포
              </button>
              <button onClick={() => window.print()} className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 font-bold shadow transition">
                <IconPrinter /> 퍼즐 출력하기
              </button>
            </div>
          </header>

          {/* 온라인 배포 모달창 (URL 및 QR) */}
          {shareUrl && (
            <div className="bg-white border-2 border-blue-500 shadow-xl rounded-xl p-6 mb-6 no-print flex flex-col md:flex-row gap-6 items-center">
              <div className="flex-1">
                <h3 className="text-lg font-bold text-blue-700 mb-2">🎉 온라인 과제 링크가 생성되었습니다!</h3>
                <p className="text-sm text-gray-600 mb-4">아래 주소를 복사하여 학급 게시판이나 메신저로 공유하세요. 학생들은 링크 클릭만으로 퍼즐을 풀 수 있습니다.</p>
                <div className="flex gap-2">
                  <input type="text" readOnly value={shareUrl} className="flex-1 bg-gray-100 border p-2 rounded text-sm text-gray-500" />
                  <button onClick={() => { navigator.clipboard.writeText(shareUrl); alert('복사되었습니다!'); }} className="bg-blue-600 text-white px-4 py-2 rounded font-bold">복사</button>
                </div>
              </div>
              <div className="bg-gray-50 p-3 rounded-lg border text-center">
                <p className="text-xs font-bold text-gray-500 mb-2">스마트폰 접속용 QR코드</p>
                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(shareUrl)}`} alt="QR Code" className="w-24 h-24 mx-auto" />
              </div>
              <button onClick={() => setShareUrl('')} className="absolute top-4 right-4 text-gray-400 hover:text-red-500 font-bold text-xl">×</button>
            </div>
          )}

          <div className="flex flex-col lg:flex-row gap-6 no-print">
            
            {/* 좌측 패널: 보드 및 설정 */}
            <div className="flex-[2] bg-white shadow-lg rounded-xl p-6 overflow-hidden flex flex-col">
              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b pb-4">
                <h2 className="text-lg font-bold text-gray-700">모눈종이 (클릭하여 단어 시작)</h2>
                
                <div className="flex flex-wrap items-center gap-4 text-sm bg-gray-50 p-2 rounded-lg border">
                  <label className="flex items-center gap-2 font-bold text-gray-600">
                    가로 <input type="number" min="5" max="25" value={boardCols} onChange={e=>setBoardCols(Number(e.target.value))} className="w-12 border p-1 rounded font-normal" />
                  </label>
                  <label className="flex items-center gap-2 font-bold text-gray-600">
                    세로 <input type="number" min="5" max="25" value={boardRows} onChange={e=>setBoardRows(Number(e.target.value))} className="w-12 border p-1 rounded font-normal" />
                  </label>
                  <label className="flex items-center gap-2 font-bold text-gray-600 border-l pl-4">
                    빈칸 색상 <input type="color" value={emptyColor} onChange={e=>setEmptyColor(e.target.value)} className="w-8 h-8 rounded cursor-pointer border-0 p-0" />
                  </label>
                </div>
              </div>

              <div className="flex justify-center overflow-x-auto pb-4 flex-1">
                <div className="inline-grid gap-0 border-2 border-gray-400 print-exact" style={{ gridTemplateColumns: `repeat(${boardCols}, minmax(0, 1fr))` }}>
                  {grid.map((row, rIdx) => row.map((cell, cIdx) => {
                    const isSelected = selectedCell?.r === rIdx && selectedCell?.c === cIdx;
                    return (
                      <div 
                        key={`${rIdx}-${cIdx}`} onClick={() => handleCellClick(rIdx, cIdx)}
                        className={`w-9 h-9 sm:w-11 sm:h-11 relative flex items-center justify-center border border-gray-300 cursor-pointer transition-colors
                          ${isSelected ? 'bg-blue-300 ring-2 ring-blue-600 z-20 shadow-lg' : cell ? 'bg-white hover:bg-blue-50' : 'hover:opacity-80'}
                        `}
                        style={{ backgroundColor: cell === null ? (isSelected ? undefined : emptyColor) : undefined }}
                      >
                        {cell && (
                          <>
                            {cell.number && <span className="absolute top-[2px] left-[3px] text-[10px] font-bold text-gray-500 z-10 leading-none">{cell.number}</span>}
                            <span className="text-lg font-bold text-gray-800">{showAnswers || isSelected ? cell.letter : ''}</span>
                          </>
                        )}
                        {!cell && isSelected && <span className="text-white drop-shadow font-bold text-xl">+</span>}
                      </div>
                    )
                  }))}
                </div>
              </div>
            </div>

            {/* 우측 패널: 단어 추가 폼 & 목록 */}
            <div className="flex-[1] flex flex-col gap-6 min-w-[320px]">
              
              {/* 단어 추가 폼 */}
              <div className={`bg-white shadow-lg rounded-xl p-5 border-t-4 transition-colors ${selectedCell ? 'border-blue-500' : 'border-gray-200 opacity-80'}`}>
                <h3 className="font-bold text-gray-800 mb-3 flex items-center justify-between">
                  새 단어 입력
                  {selectedCell && <span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">좌표: {selectedCell.r + 1}행, {selectedCell.c + 1}열</span>}
                </h3>
                
                {!selectedCell && <p className="text-xs text-blue-600 bg-blue-50 p-2 rounded mb-4">👆 왼쪽 모눈종이에서 단어를 넣을 칸을 클릭하세요.</p>}

                <div className="space-y-3">
                  <div className="flex gap-1 p-1 bg-gray-100 rounded-lg">
                    <button onClick={() => setDirection('across')} disabled={!selectedCell} className={`flex-1 py-1.5 text-sm font-bold rounded shadow-sm transition ${direction === 'across' ? 'bg-white text-blue-600' : 'text-gray-500'}`}>가로 ➔</button>
                    <button onClick={() => setDirection('down')} disabled={!selectedCell} className={`flex-1 py-1.5 text-sm font-bold rounded shadow-sm transition ${direction === 'down' ? 'bg-white text-blue-600' : 'text-gray-500'}`}>세로 ⬇</button>
                  </div>
                  <input type="text" disabled={!selectedCell} value={inputWord} onChange={e => setInputWord(e.target.value)} placeholder="단어 (Word)" className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 font-bold" />
                  <textarea disabled={!selectedCell} value={inputClue} onChange={e => setInputClue(e.target.value)} placeholder="힌트 설명 (Clue)" rows="2" className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 resize-none text-sm" />
                  <button onClick={handleAddWord} disabled={!selectedCell} className="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 transition flex items-center justify-center gap-1"><IconPlus /> 보드에 배치</button>
                </div>
              </div>

              {/* 구조화된 힌트 목록 (가로/세로 분리) */}
              <div className="bg-white shadow-lg rounded-xl p-5 flex-1 flex flex-col max-h-[500px]">
                <h3 className="font-bold text-gray-800 mb-4 border-b pb-2 flex justify-between">
                  등록된 열쇠 목록 <span className="bg-gray-100 text-gray-600 px-2 rounded text-sm">{placedWords.length}개</span>
                </h3>
                
                <div className="overflow-y-auto pr-2 flex-1 space-y-6">
                  {/* 가로 열쇠 */}
                  <div>
                    <h4 className="text-sm font-bold text-blue-600 mb-2 sticky top-0 bg-white py-1">가로 열쇠 (Across)</h4>
                    {clues.across.length === 0 ? <p className="text-xs text-gray-400">없음</p> : (
                      <ul className="space-y-2">
                        {clues.across.map(c => (
                          <li key={c.id} className="group flex justify-between items-start text-sm bg-gray-50 p-2 rounded border border-transparent hover:border-blue-200">
                            <div className="flex gap-2">
                              <span className="font-bold text-gray-700 min-w-[16px]">{c.number}.</span>
                              <span className="text-gray-600">{c.clue}</span>
                            </div>
                            <button onClick={() => handleDeleteWord(c.id)} className="text-red-300 hover:text-red-600 opacity-0 group-hover:opacity-100 transition p-1"><IconTrash/></button>
                          </li>
                        ))}
                      </ul>
                    )}
                  </div>
                  
                  {/* 세로 열쇠 */}
                  <div>
                    <h4 className="text-sm font-bold text-green-600 mb-2 sticky top-0 bg-white py-1">세로 열쇠 (Down)</h4>
                    {clues.down.length === 0 ? <p className="text-xs text-gray-400">없음</p> : (
                      <ul className="space-y-2">
                        {clues.down.map(c => (
                          <li key={c.id} className="group flex justify-between items-start text-sm bg-gray-50 p-2 rounded border border-transparent hover:border-green-200">
                            <div className="flex gap-2">
                              <span className="font-bold text-gray-700 min-w-[16px]">{c.number}.</span>
                              <span className="text-gray-600">{c.clue}</span>
                            </div>
                            <button onClick={() => handleDeleteWord(c.id)} className="text-red-300 hover:text-red-600 opacity-0 group-hover:opacity-100 transition p-1"><IconTrash/></button>
                          </li>
                        ))}
                      </ul>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* 인쇄용 렌더링 영역 (보이지 않다가 인쇄 시에만 활성화) */}
          <div className="hidden print-only print:block mt-8 print-exact">
            <h1 className="text-3xl font-bold text-center mb-8">십자말풀이 퍼즐</h1>
            <div className="flex justify-center mb-10">
              <div className="inline-grid gap-0 border-2 border-gray-600" style={{ gridTemplateColumns: `repeat(${boardCols}, minmax(0, 1fr))` }}>
                {grid.map((row, rIdx) => row.map((cell, cIdx) => (
                  <div key={`${rIdx}-${cIdx}`} className="w-10 h-10 relative flex items-center justify-center border border-gray-400" style={{ backgroundColor: cell === null ? emptyColor : '#ffffff' }}>
                    {cell !== null && (
                      <>
                        {cell.number && <span className="absolute top-0.5 left-1 text-[10px] font-bold text-gray-600 z-10">{cell.number}</span>}
                        <span className={`text-lg font-bold ${showAnswers ? 'text-gray-900' : 'text-transparent'}`}>{showAnswers ? cell.letter : ''}</span>
                      </>
                    )}
                  </div>
                )))}
              </div>
            </div>
            <div className="grid grid-cols-2 gap-8 text-sm break-inside-avoid">
              <div>
                <h3 className="font-bold text-lg mb-3 border-b border-gray-800 pb-2">가로 열쇠</h3>
                <ul className="space-y-2">
                  {clues.across.map((c, i) => <li key={i} className="flex gap-2"><span className="font-bold min-w-[20px]">{c.number}.</span><span>{c.clue}</span></li>)}
                </ul>
              </div>
              <div>
                <h3 className="font-bold text-lg mb-3 border-b border-gray-800 pb-2">세로 열쇠</h3>
                <ul className="space-y-2">
                  {clues.down.map((c, i) => <li key={i} className="flex gap-2"><span className="font-bold min-w-[20px]">{c.number}.</span><span>{c.clue}</span></li>)}
                </ul>
              </div>
            </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
