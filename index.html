<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>십자말풀이 퍼즐 메이커 (수동 에디터)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body class="bg-gray-100 font-sans min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
    const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;

    function App() {
      // 보드 설정
      const [boardCols, setBoardCols] = useState(15);
      const [boardRows, setBoardRows] = useState(15);
      
      // 배치된 단어들 목록 { id, word, clue, r, c, isHorizontal }
      const [placedWords, setPlacedWords] = useState([]);
      
      // 사용자 입력 상태
      const [selectedCell, setSelectedCell] = useState(null); // { r, c }
      const [direction, setDirection] = useState('across'); // 'across' | 'down'
      const [inputWord, setInputWord] = useState('');
      const [inputClue, setInputClue] = useState('');

      // 인쇄 모드 상태
      const [isPrintMode, setIsPrintMode] = useState(false);
      const [showAnswers, setShowAnswers] = useState(false);

      // placedWords를 바탕으로 실시간 2D 그리드 생성 (충돌 검사 및 렌더링용)
      const { grid, clues } = useMemo(() => {
        let newGrid = Array(boardRows).fill(null).map(() => Array(boardCols).fill(null));
        let acrossClues = [];
        let downClues = [];
        let currentNumber = 1;

        // 글자 먼저 채우기
        placedWords.forEach(wordObj => {
          for (let i = 0; i < wordObj.word.length; i++) {
            let r = wordObj.isHorizontal ? wordObj.r : wordObj.r + i;
            let c = wordObj.isHorizontal ? wordObj.c + i : wordObj.c;
            if (r < boardRows && c < boardCols) {
              if (!newGrid[r][c]) newGrid[r][c] = { letter: wordObj.word[i], number: null };
            }
          }
        });

        // 시작점 번호 매기기 및 힌트 분류
        for (let r = 0; r < boardRows; r++) {
          for (let c = 0; c < boardCols; c++) {
            let startsWord = false;
            
            let wordAcross = placedWords.find(w => w.isHorizontal && w.r === r && w.c === c);
            if (wordAcross) {
              acrossClues.push({ number: currentNumber, clue: wordAcross.clue });
              startsWord = true;
            }

            let wordDown = placedWords.find(w => !w.isHorizontal && w.r === r && w.c === c);
            if (wordDown) {
              downClues.push({ number: currentNumber, clue: wordDown.clue });
              startsWord = true;
            }

            if (startsWord && newGrid[r][c]) {
              newGrid[r][c].number = currentNumber;
              currentNumber++;
            }
          }
        }

        return { grid: newGrid, clues: { across: acrossClues, down: downClues } };
      }, [placedWords, boardRows, boardCols]);

      // 칸 클릭 핸들러
      const handleCellClick = (r, c) => {
        setSelectedCell({ r, c });
      };

      // 단어 배치 로직
      const handleAddWord = () => {
        if (!selectedCell) return alert("먼저 그리드에서 단어가 시작할 칸을 클릭해주세요.");
        if (!inputWord.trim() || !inputClue.trim()) return alert("단어와 힌트를 모두 입력해주세요.");

        const word = inputWord.trim().toUpperCase();
        const isHorizontal = direction === 'across';
        const { r, c } = selectedCell;

        // 경계선 이탈 검사
        if (isHorizontal && c + word.length > boardCols) return alert("단어가 보드 가로 크기를 벗어납니다.");
        if (!isHorizontal && r + word.length > boardRows) return alert("단어가 보드 세로 크기를 벗어납니다.");

        // 글자 충돌 검사 (핵심 로직: 기존 글자와 같으면 허용, 다르면 차단)
        for (let i = 0; i < word.length; i++) {
          let checkR = isHorizontal ? r : r + i;
          let checkC = isHorizontal ? c + i : c;
          
          if (grid[checkR][checkC] !== null && grid[checkR][checkC].letter !== word[i]) {
            return alert(`'${word[i]}' 글자가 기존에 배치된 칸의 글자와 충돌합니다. 위치나 방향을 다시 확인해주세요.`);
          }
        }

        // 문제 없으면 단어 목록에 추가 (자동으로 그리드가 리렌더링됨)
        const newWord = {
          id: Date.now(),
          word: word,
          clue: inputClue,
          r: r,
          c: c,
          isHorizontal: isHorizontal
        };

        setPlacedWords([...placedWords, newWord]);
        setInputWord('');
        setInputClue('');
        setSelectedCell(null); // 배치 후 선택 해제
      };

      // 배치된 단어 삭제
      const handleDeleteWord = (id) => {
        setPlacedWords(placedWords.filter(w => w.id !== id));
      };

      // 보드 초기화
      const handleResetBoard = () => {
        if(confirm("배치된 모든 단어가 삭제됩니다. 초기화 하시겠습니까?")) {
          setPlacedWords([]);
          setSelectedCell(null);
        }
      };

      const handlePrint = () => {
        setIsPrintMode(true);
        setTimeout(() => {
          window.print();
          setIsPrintMode(false);
        }, 100);
      };

      // 인쇄 모드 렌더링
      if (isPrintMode) {
        return (
          <div className="bg-white p-8">
            <style>
              {`@media print { @page { size: A4 portrait; margin: 1.5cm; } body { background: white !important; } }`}
            </style>
            <h1 className="text-3xl font-bold text-center mb-8">십자말풀이 퍼즐</h1>
            <div className="flex justify-center mb-10">
              <div className="inline-grid gap-0 bg-black border-2 border-black" style={{ gridTemplateColumns: `repeat(${boardCols}, minmax(0, 1fr))` }}>
                {grid.map((row, rIdx) => row.map((cell, cIdx) => (
                  <div key={`${rIdx}-${cIdx}`} className={`w-10 h-10 relative flex items-center justify-center border border-gray-400 ${cell === null ? 'bg-black border-black' : 'bg-white'}`}>
                    {cell !== null && (
                      <>
                        {cell.number && <span className="absolute top-0.5 left-1 text-[10px] font-bold text-gray-700 z-10">{cell.number}</span>}
                        <span className={`text-lg font-bold ${showAnswers ? 'text-gray-900' : 'text-transparent'}`}>{showAnswers ? cell.letter : ''}</span>
                      </>
                    )}
                  </div>
                )))}
              </div>
            </div>
            <div className="grid grid-cols-2 gap-8">
              <div>
                <h3 className="font-bold text-lg mb-3 border-b-2 border-gray-800 pb-2">가로 열쇠</h3>
                <ul className="space-y-3">
                  {clues.across.map((c, i) => <li key={i} className="flex gap-2 text-sm"><span className="font-bold min-w-[20px]">{c.number}.</span><span>{c.clue}</span></li>)}
                </ul>
              </div>
              <div>
                <h3 className="font-bold text-lg mb-3 border-b-2 border-gray-800 pb-2">세로 열쇠</h3>
                <ul className="space-y-3">
                  {clues.down.map((c, i) => <li key={i} className="flex gap-2 text-sm"><span className="font-bold min-w-[20px]">{c.number}.</span><span>{c.clue}</span></li>)}
                </ul>
              </div>
            </div>
          </div>
        );
      }

      // 일반 편집 모드 렌더링
      return (
        <div className="max-w-7xl mx-auto px-4 py-8">
          <header className="flex justify-between items-center bg-white shadow rounded-xl p-6 mb-6">
            <h1 className="text-2xl font-bold text-gray-800">십자말풀이 직접 만들기 (에디터 모드)</h1>
            <div className="flex gap-3">
              <button onClick={() => setShowAnswers(!showAnswers)} className="px-4 py-2 border border-indigo-200 text-indigo-700 rounded-lg hover:bg-indigo-50 font-medium transition">
                {showAnswers ? '정답 숨기기' : '전체 정답 보기'}
              </button>
              <button onClick={handlePrint} className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 font-bold shadow transition">
                <IconPrinter /> 퍼즐 인쇄하기
              </button>
            </div>
          </header>

          <div className="flex flex-col lg:flex-row gap-6">
            {/* 왼쪽: 에디터 캔버스 (그리드) */}
            <div className="flex-1 bg-white shadow-lg rounded-xl p-6 overflow-x-auto">
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-lg font-bold text-gray-700">퍼즐 보드 (클릭하여 시작 위치 선택)</h2>
                <div className="flex items-center gap-4 text-sm">
                  <label className="flex items-center gap-1">가로칸: <input type="number" min="5" max="30" value={boardCols} onChange={e=>setBoardCols(Number(e.target.value))} className="w-12 border p-1 rounded" /></label>
                  <label className="flex items-center gap-1">세로칸: <input type="number" min="5" max="30" value={boardRows} onChange={e=>setBoardRows(Number(e.target.value))} className="w-12 border p-1 rounded" /></label>
                  <button onClick={handleResetBoard} className="text-red-500 hover:text-red-700 font-bold ml-2">보드 초기화</button>
                </div>
              </div>

              <div className="flex justify-center select-none min-w-max pb-4">
                <div className="inline-grid gap-0 bg-gray-200 border-2 border-gray-400" style={{ gridTemplateColumns: `repeat(${boardCols}, minmax(0, 1fr))` }}>
                  {grid.map((row, rIdx) => row.map((cell, cIdx) => {
                    const isSelected = selectedCell?.r === rIdx && selectedCell?.c === cIdx;
                    return (
                      <div 
                        key={`${rIdx}-${cIdx}`} 
                        onClick={() => handleCellClick(rIdx, cIdx)}
                        className={`w-10 h-10 md:w-12 md:h-12 relative flex items-center justify-center border border-gray-300 cursor-pointer transition-colors
                          ${isSelected ? 'bg-blue-300 ring-2 ring-blue-500 z-20' : cell ? 'bg-white hover:bg-blue-50' : 'bg-gray-100 hover:bg-gray-300'}
                        `}
                      >
                        {cell && (
                          <>
                            {cell.number && <span className="absolute top-0.5 left-1 text-[10px] font-bold text-gray-500 z-10">{cell.number}</span>}
                            <span className="text-lg font-bold text-gray-800">{cell.letter}</span>
                          </>
                        )}
                        {!cell && isSelected && <span className="text-blue-600 font-bold text-xl">+</span>}
                      </div>
                    )
                  }))}
                </div>
              </div>
            </div>

            {/* 오른쪽: 단어 입력 및 관리 패널 */}
            <div className="w-full lg:w-[400px] flex flex-col gap-6">
              
              {/* 입력 폼 */}
              <div className={`bg-white shadow-lg rounded-xl p-6 border-t-4 ${selectedCell ? 'border-blue-500' : 'border-gray-200 opacity-70'}`}>
                <h3 className="text-lg font-bold text-gray-800 mb-4">
                  단어 추가 
                  {selectedCell && <span className="text-blue-600 ml-2 text-sm">({selectedCell.r + 1}행, {selectedCell.c + 1}열 선택됨)</span>}
                </h3>
                
                {!selectedCell && <p className="text-sm text-gray-500 mb-4 bg-gray-50 p-3 rounded">👈 왼쪽 그리드에서 단어를 시작할 빈 칸(또는 연결할 글자 칸)을 먼저 클릭해주세요.</p>}

                <div className="space-y-4">
                  <div className="flex gap-2 bg-gray-100 p-1 rounded-lg">
                    <button onClick={() => setDirection('across')} disabled={!selectedCell} className={`flex-1 py-2 text-sm font-bold rounded-md transition ${direction === 'across' ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}>가로 방향 ➔</button>
                    <button onClick={() => setDirection('down')} disabled={!selectedCell} className={`flex-1 py-2 text-sm font-bold rounded-md transition ${direction === 'down' ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}>세로 방향 ⬇</button>
                  </div>
                  
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1">단어 (Word)</label>
                    <input 
                      type="text" 
                      disabled={!selectedCell}
                      value={inputWord} 
                      onChange={(e) => setInputWord(e.target.value)} 
                      placeholder={selectedCell ? "단어를 입력하세요" : "칸을 먼저 선택하세요"}
                      className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100" 
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1">힌트 설명 (Clue)</label>
                    <textarea 
                      disabled={!selectedCell}
                      value={inputClue} 
                      onChange={(e) => setInputClue(e.target.value)} 
                      placeholder="단어에 대한 설명을 입력하세요"
                      rows="3"
                      className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 resize-none disabled:bg-gray-100" 
                    />
                  </div>

                  <button 
                    onClick={handleAddWord} 
                    disabled={!selectedCell}
                    className="w-full flex justify-center items-center gap-2 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed transition"
                  >
                    <IconPlus /> 그리드에 배치하기
                  </button>
                </div>
              </div>

              {/* 배치된 단어 목록 */}
              <div className="bg-white shadow-lg rounded-xl p-6 flex-1 overflow-hidden flex flex-col">
                <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2 flex justify-between">
                  배치된 단어 목록 
                  <span className="text-blue-600 bg-blue-50 px-2 py-0.5 rounded text-sm">{placedWords.length}개</span>
                </h3>
                <div className="overflow-y-auto pr-2 space-y-3">
                  {placedWords.length === 0 ? (
                    <p className="text-sm text-gray-500 text-center py-4">아직 배치된 단어가 없습니다.</p>
                  ) : (
                    placedWords.map((item) => (
                      <div key={item.id} className="bg-gray-50 border border-gray-100 p-3 rounded-lg flex justify-between items-start group hover:border-blue-300 transition">
                        <div>
                          <div className="flex items-center gap-2 mb-1">
                            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded text-white ${item.isHorizontal ? 'bg-indigo-500' : 'bg-emerald-500'}`}>
                              {item.isHorizontal ? '가로' : '세로'}
                            </span>
                            <span className="font-bold text-gray-800">{item.word}</span>
                          </div>
                          <p className="text-xs text-gray-600 line-clamp-2">{item.clue}</p>
                        </div>
                        <button onClick={() => handleDeleteWord(item.id)} className="text-gray-400 hover:text-red-500 p-1 bg-white rounded-md shadow-sm border border-transparent group-hover:border-red-100 transition">
                          <IconTrash />
                        </button>
                      </div>
                    ))
                  )}
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
